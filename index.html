<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Редирект через 3 секунды на нужный адрес -->
    <meta http-equiv="refresh" content="3; url=https://onetaprbx.github.io/forum/">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #0b0b0b; /* Темный фон форума */
            color: #cccccc;           /* Серый текст */
            font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .redirect-box {
            background-color: #1a1a1a; /* Цвет блока сообщения */
            border: 1px solid #333;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            color: #e0e0e0;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: normal;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .loader {
            color: #5c7080;
            font-size: 12px;
            text-decoration: none;
        }

        .loader a {
            color: #828282;
            text-decoration: none;
        }

        .loader a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="redirect-box">
        <h2>Redirecting...</h2>
        <p>Please wait</p>
        
        <div class="loader">
            If your browser doesnt support redirect, <br>
            <a href="https://onetaprbx.github.io/forum/">click here</a>.
        </div>
    </div>

</body>
</html>
