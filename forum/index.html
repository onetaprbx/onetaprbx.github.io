<!DOCTYPE html>
<html>
<head>
<title>Error</title>
<style>
  html { color-scheme: light dark; }
  body { 
    margin: 0;
    padding: 0; 
    font-family: Tahoma, Verdana, Arial, sans-serif; 
    display: flex;
    justify-content: center;
    align-items: flex-start; 
    min-height: 100vh;
  }

  /* ТОНКАЯ СТАТИЧНАЯ ШЛЯПА В САМОМ ВЕРХУ */
  .top-hat {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 3px; 
    background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
    z-index: 100;
  }

  .error-box {
    margin-top: 50px; 
    width: 65em; 
    padding: 30px;
    text-align: center;
    position: relative;
    
    /* Твоя анимированная обводка */
    border: 2px solid transparent;
    border-image: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet) 1;
    animation: rainbow-border 5s linear infinite;
  }

  /* АНИМИРОВАННЫЙ ТЕКСТ */
  h1, p, em {
    background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow-border 5s linear infinite;
  }

  @keyframes rainbow-border {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="top-hat"></div>

  <div class="error-box">
    <h1>Oh No!</h1>
    <p>An error occurred.</p>
    <p>Sorry, the page you are looking for is currently unavailable. Or nginx doesnt launched.<br/>
    Please try again later. Or report.</p>
    <p><em>Regards. Onetap team</em></p>
  </div>
</body>
</html>
